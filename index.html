<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EMSA — Clientes x Cobrar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f14;--bg2:#13161e;--bg3:#1a1d27;--bdr:rgba(255,255,255,0.07);--bdr2:rgba(255,255,255,0.13);--text:#e8eaf0;--muted:#7a7f94;--acc:#1d9e75;--grn:#1d9e75;--red:#c94a4a;--amb:#d4890f;--font:'DM Sans',system-ui,sans-serif;--mono:'JetBrains Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh}
header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--bdr);position:sticky;top:0;background:var(--bg);z-index:100}
.badge{background:var(--grn);color:#fff;font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px;letter-spacing:.5px}
.htitle{font-size:15px;font-weight:500;margin-left:10px}
.hsub{font-size:11px;color:var(--muted);margin-left:10px;margin-top:1px}
.dtag{font-size:10px;color:var(--muted);background:var(--bg3);border:1px solid var(--bdr2);padding:3px 8px;border-radius:4px}
.tabs{display:flex;gap:2px;padding:0 20px;border-bottom:1px solid var(--bdr)}
.tab{padding:10px 18px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab:hover{color:var(--text)}.tab.on{color:var(--text);border-bottom-color:var(--grn)}
main{padding:18px 20px 40px;max-width:1100px}
.kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:18px}
.kpi{background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:13px 15px}
.kpi-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
.kpi-v{font-size:18px;font-weight:600;font-family:var(--mono);letter-spacing:-.5px}
.kpi-s{font-size:11px;color:var(--muted);margin-top:3px}
.red{color:var(--red)}.grn{color:var(--grn)}.amb{color:var(--amb)}
.search-wrap{position:relative;margin-bottom:14px}
.search-wrap input{width:100%;padding:10px 16px;background:var(--bg2);border:1px solid var(--bdr2);border-radius:8px;color:var(--text);font-family:var(--font);font-size:14px;outline:none}
.search-wrap input:focus{border-color:var(--acc)}
.search-wrap input::placeholder{color:var(--muted)}
#autocomplete,#hist-ac{position:absolute;top:100%;left:0;right:0;background:var(--bg2);border:1px solid var(--bdr2);border-radius:0 0 8px 8px;z-index:50;max-height:220px;overflow-y:auto;display:none}
.ac-item{padding:9px 16px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--bdr)}
.ac-item:hover{background:var(--bg3)}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.filter-btn{padding:5px 13px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--bdr2);border-radius:20px;background:none;color:var(--muted);transition:all .15s}
.filter-btn:hover{color:var(--text)}.filter-btn.on{color:var(--bg);background:var(--text);border-color:var(--text)}
.tag{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer}
.tag-red{background:rgba(201,74,74,.15);color:var(--red);border:1px solid rgba(201,74,74,.3)}
.tag-amb{background:rgba(212,137,15,.15);color:var(--amb);border:1px solid rgba(212,137,15,.3)}
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;margin-bottom:14px}
.card-head{padding:13px 16px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.card-title{font-size:13px;font-weight:500}.card-sub{font-size:11px;color:var(--muted);margin-top:2px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{padding:9px 13px;text-align:right;font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;background:var(--bg3);border-bottom:1px solid var(--bdr);white-space:nowrap}
thead th:first-child{text-align:left}
tbody td{padding:8px 13px;border-bottom:1px solid var(--bdr);text-align:right;font-family:var(--mono);font-size:11px;color:var(--text)}
tbody td:first-child{text-align:left;font-family:var(--font);font-size:12px}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(255,255,255,.02)}
tbody tr.clickable{cursor:pointer}
.badge-venc{font-size:10px;padding:2px 7px;border-radius:4px;background:rgba(201,74,74,.15);color:var(--red);font-family:var(--font)}
.badge-ok{font-size:10px;padding:2px 7px;border-radius:4px;background:rgba(29,158,117,.15);color:var(--grn);font-family:var(--font)}
.heat-toggle{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);cursor:pointer;user-select:none}
td.heat-1{background:rgba(201,74,74,.12)}td.heat-2{background:rgba(201,74,74,.25)}td.heat-3{background:rgba(201,74,74,.40)}td.heat-4{background:rgba(201,74,74,.60)}
.ficha{background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:18px;margin-bottom:14px}
.ficha-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.ficha-nombre{font-size:15px;font-weight:600}.ficha-rut{font-size:12px;color:var(--muted);margin-top:2px}
.ficha-stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:14px}
.stat{background:var(--bg3);border-radius:8px;padding:10px 12px}
.stat-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.stat-v{font-size:16px;font-weight:600;font-family:var(--mono)}
.doc-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bdr);font-size:12px}
.doc-row:last-child{border-bottom:none}
.doc-left{display:flex;flex-direction:column;gap:2px}
.doc-tipo{font-size:11px;color:var(--muted)}
.doc-right{text-align:right}.doc-monto{font-family:var(--mono);font-size:13px;font-weight:500}
.doc-dias{font-size:11px;margin-top:2px}
tbody tr.sel td{background:rgba(29,158,117,.08)!important}
.drill{border-left:3px solid var(--grn);background:var(--bg3);border-radius:0 8px 8px 0;padding:12px 16px;margin-top:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.state-box{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:12px;color:var(--muted);font-size:13px}
.exc-input{padding:4px 10px;border-radius:20px;border:1px solid var(--bdr2);background:transparent;color:var(--text);font-size:12px;outline:none;width:170px}
@media(max-width:600px){header,main,.tabs{padding-left:14px;padding-right:14px}.kpis{grid-template-columns:1fr 1fr}.ficha-stats{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center">
    <span class="badge">EMSA</span>
    <div><span class="htitle">Clientes x Cobrar</span><div class="hsub">CLIENTES VENTAS (CxCob) · Cuenta 1104001</div></div>
  </div>
  <div style="display:flex;gap:12px;align-items:center">
  <div style="display:flex;gap:4px;align-items:center">
    <a href="https://joaquinsilvanavia.github.io/emsa-proveedores/" style="padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500;text-decoration:none;border:1px solid rgba(255,255,255,.12);color:#7a7f94">CxP</a>
    <a href="https://joaquinsilvanavia.github.io/emsa-clientes/"    style="padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500;text-decoration:none;border:1px solid rgba(29,158,117,.5);color:#1d9e75;background:rgba(29,158,117,.1)">CxC</a>
    <a href="https://joaquinsilvanavia.github.io/emsa-ventas/"     style="padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500;text-decoration:none;border:1px solid rgba(255,255,255,.12);color:#7a7f94">Ventas</a>
    <a href="https://joaquinsilvanavia.github.io/emsa-stock/"      style="padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500;text-decoration:none;border:1px solid rgba(255,255,255,.12);color:#7a7f94">Stock</a>
  </div>
  <span class="dtag" id="dtag">Cargando...</span>
  </div>
</header>

<div class="tabs">
  <button class="tab on" onclick="showTab('buscar',this)">Buscar cliente</button>
  <button class="tab"    onclick="showTab('resumen',this)">Resumen general</button>
  <button class="tab"    onclick="showTab('historico',this)">Histórico</button>
</div>

<main id="mc"></main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>

// ── AUTENTICACIÓN ─────────────────────────────────────────────
(function(){
  var KEY = 'emsa_auth', PWD = 'LuisSilvaEMSA';
  if(localStorage.getItem(KEY) === PWD) return;
  var ok = false;
  while(!ok){
    var input = prompt('EMSA — Ingresa la clave de acceso:');
    if(input === null) { document.body.innerHTML=''; return; }
    if(input === PWD) { localStorage.setItem(KEY, PWD); ok = true; }
    else alert('Clave incorrecta. Intenta nuevamente.');
  }
})();

// ── CONFIGURACIÓN SHEETS ─────────────────────────────────────
const SHEET_ID = "1TQRW0KhYG9LSyoQAo2asseT8tUvm6CHUEoRquULJkzI";
const API_KEY  = "AIzaSyCXaM0fXC-6H-Pz22uRTv52uMe3xtIoLkU";

let D = [];  // datos cargados desde Sheets

async function loadData() {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/datos!A:O?key=${API_KEY}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const json = await r.json();
  const rows = json.values || [];
  if (rows.length < 2) return [];
  const h = rows[0];
  return rows.slice(1).map(row => {
    const o = {}; h.forEach((k,i) => o[k] = row[i] ?? ''); return o;
  });
}

async function loadMeta() {
  try {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/meta!A1?key=${API_KEY}`;
    const r = await fetch(url);
    const json = await r.json();
    return json.values?.[0]?.[0] || '';
  } catch(e) { return ''; }
}
const TRAMOS=['120+','90-120','60-90','30-60','7-30','0-7','POR VENCER'];
const TL={'POR VENCER':'Por Vencer','0-7':'0–7d','7-30':'7–30d','30-60':'30–60d','60-90':'60–90d','90-120':'90–120d','120+':'120+ d'};

let tab='buscar', fest='todos', exCli=new Set(), exCat=new Set(), heat=true, hMax={}, histChart=null;
let selAnios=new Set(['2025','2026']); // filtro años emisión — 2025 y 2026 preseleccionados

const num=v=>{const n=parseFloat(String(v).replace(/[^0-9.-]/g,''));return isNaN(n)?0:n;};
const fmtM=v=>'$'+(v/1e6).toLocaleString('es-CL',{minimumFractionDigits:1,maximumFractionDigits:1})+'M';
const fmtCL=v=>'$'+Math.round(v).toLocaleString('es-CL');

function fd(){
  return D.filter(r=>{
    if(fest==='vencido'   && r.ESTADO!=='VENCIDO')    return false;
    if(fest==='porvencer' && r.ESTADO!=='POR VENCER') return false;
    if(exCli.size && exCli.has(r['NOMBRE /RAZON SOCIAL'])) return false;
    if(exCat.size && exCat.has(r.CLI_HOLDING)) return false;
    if(selAnios.size){
      const anio=r['MES-AÑO']?String(r['MES-AÑO']).slice(0,4):'';
      if(!selAnios.has(anio)) return false;
    }
    return true;
  });
}

function showTab(t,btn){tab=t;document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');render();}
function render(){if(tab==='buscar')rBuscar();else if(tab==='resumen')rResumen();else rHist();}

// ── BUSCAR ────────────────────────────────────────────────────
function rBuscar(){
  document.getElementById('mc').innerHTML=`
    <div class="search-wrap" style="margin-top:18px">
      <input id="inp" placeholder="Buscar por nombre o RUT..." autocomplete="off"
        oninput="onSI(this.value)" onkeydown="if(event.key==='Enter')doS()"/>
      <div id="autocomplete"></div>
    </div>
    <div class="filter-row">
      <button class="filter-btn ${fest==='todos'?'on':''}"     onclick="setF('todos',this)">Todos</button>
      <button class="filter-btn ${fest==='vencido'?'on':''}"   onclick="setF('vencido',this)">Vencidos</button>
      <button class="filter-btn ${fest==='porvencer'?'on':''}" onclick="setF('porvencer',this)">Por vencer</button>
    </div>
    <div id="ficha-area"></div>`;
}

function onSI(v){
  const ac=document.getElementById('autocomplete');
  if(v.length<2){ac.style.display='none';return;}
  const q=v.toLowerCase();
  const m=[...new Map(D.filter(r=>r['NOMBRE /RAZON SOCIAL'].toLowerCase().includes(q)||r['RUT COMPLETO'].includes(q)).map(r=>[r['NOMBRE /RAZON SOCIAL'],r])).values()].slice(0,8);
  if(!m.length){ac.style.display='none';return;}
  ac.innerHTML=m.map(r=>`<div class="ac-item" onclick="selCli('${r['NOMBRE /RAZON SOCIAL'].replace(/'/g,"\\'")}')"><b>${r['NOMBRE /RAZON SOCIAL']}</b> <span style="color:var(--muted);font-size:11px">${r['RUT COMPLETO']}</span></div>`).join('');
  ac.style.display='block';
}

function selCli(n){document.getElementById('inp').value=n;document.getElementById('autocomplete').style.display='none';rFicha(n);}
function doS(){const v=document.getElementById('inp').value.trim();if(!v)return;const m=D.find(r=>r['NOMBRE /RAZON SOCIAL'].toLowerCase()===v.toLowerCase()||r['RUT COMPLETO']===v);if(m)rFicha(m['NOMBRE /RAZON SOCIAL']);}
function setF(f){fest=f;rBuscar();const n=document.getElementById('inp')?.value.trim();if(n)rFicha(n);}

function rFicha(nombre){
  const docs=fd().filter(r=>r['NOMBRE /RAZON SOCIAL']===nombre);
  if(!docs.length){document.getElementById('ficha-area').innerHTML='<div class="state-box"><span>Sin documentos con el filtro actual.</span></div>';return;}
  const rut=docs[0]['RUT COMPLETO'],cat=docs[0].CLI_HOLDING,sede=docs[0].SEDE;
  const tot=docs.reduce((s,r)=>s+num(r.SALDO),0);
  const venc=docs.filter(r=>r.ESTADO==='VENCIDO').reduce((s,r)=>s+num(r.SALDO),0);
  const pv=docs.filter(r=>r.ESTADO==='POR VENCER').reduce((s,r)=>s+num(r.SALDO),0);
  const pt={};TRAMOS.forEach(t=>pt[t]=0);docs.forEach(r=>pt[r['Clasifica vcto']]=(pt[r['Clasifica vcto']]||0)+num(r.SALDO));
  const tH=TRAMOS.map(t=>pt[t]>0?`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--bdr);font-size:12px"><span style="color:${t==='POR VENCER'?'var(--grn)':'var(--red)'}">${TL[t]}</span><span style="font-family:var(--mono)">${fmtCL(pt[t])}</span></div>`:'').join('');
  const dH=[...docs].sort((a,b)=>num(b['DIAS VENCIDOS'])-num(a['DIAS VENCIDOS'])).map(r=>{
    const d=num(r['DIAS VENCIDOS']),ev=r.ESTADO==='VENCIDO';
    return `<div class="doc-row"><div class="doc-left"><span>${r['NOMBRE COD.DOC.']} #${r['#DOC.']}</span><span class="doc-tipo">Emisión: ${r['EMISIÓN']} · Vcto: ${r['VENCIM.']}</span></div><div class="doc-right"><div class="doc-monto ${ev?'red':''}">${fmtCL(num(r.SALDO))}</div><div class="doc-dias" style="color:${ev?'var(--red)':'var(--grn)'}">${ev?d+'d vencido':'Por vencer'}</div></div></div>`;
  }).join('');
  document.getElementById('ficha-area').innerHTML=`
    <div class="ficha">
      <div class="ficha-head">
        <div><div class="ficha-nombre">${nombre}</div><div class="ficha-rut">${rut} · ${cat} · ${sede}</div></div>
        <span class="${venc>0?'badge-venc':'badge-ok'}">${venc>0?'Con deuda vencida':'Al día'}</span>
      </div>
      <div class="ficha-stats">
        <div class="stat"><div class="stat-l">Total deuda</div><div class="stat-v">${fmtM(tot)}</div></div>
        <div class="stat"><div class="stat-l">Vencido</div><div class="stat-v red">${fmtM(venc)}</div></div>
        <div class="stat"><div class="stat-l">Por vencer</div><div class="stat-v grn">${fmtM(pv)}</div></div>
      </div>
      <div style="margin-bottom:14px">${tH}</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Documentos (${docs.length})</div>
      ${dH}
    </div>`;
}

// ── RESUMEN ───────────────────────────────────────────────────
function rResumen(){
  // Años disponibles para filtro
  const todosAnios=[...new Set(D.map(r=>String(r['MES-AÑO']).slice(0,4)).filter(a=>a&&a!=='unde'))].sort().reverse();
  const data=fd();
  const tot=data.reduce((s,r)=>s+num(r.SALDO),0);
  const venc=data.filter(r=>r.ESTADO==='VENCIDO').reduce((s,r)=>s+num(r.SALDO),0);
  const pv=data.filter(r=>r.ESTADO==='POR VENCER').reduce((s,r)=>s+num(r.SALDO),0);
  const nCli=new Set(data.map(r=>r['RUT COMPLETO'])).size;
  const crit=data.filter(r=>r['Clasifica vcto']==='120+').reduce((s,r)=>s+num(r.SALDO),0);

  const cats=[...new Set(D.map(r=>r.CLI_HOLDING).filter(Boolean))].sort();
  const pv2={};cats.forEach(c=>{pv2[c]={};TRAMOS.forEach(t=>pv2[c][t]=0);});
  data.forEach(r=>{if(pv2[r.CLI_HOLDING])pv2[r.CLI_HOLDING][r['Clasifica vcto']]+=num(r.SALDO);});
  hMax={};TRAMOS.filter(t=>t!=='POR VENCER').forEach(t=>hMax[t]=Math.max(...cats.map(c=>pv2[c][t]||0)));

  function hc(t,v){if(!heat||t==='POR VENCER'||!v)return'';const p=v/(hMax[t]||1);return p>.75?'heat-4':p>.5?'heat-3':p>.25?'heat-2':'heat-1';}

  const thT=TRAMOS.map(t=>`<th>${TL[t]}</th>`).join('');
  const rowsData=cats.map(c=>{
    const totC=TRAMOS.reduce((s,t)=>s+(pv2[c][t]||0),0);
    return {c,totC};
  }).filter(x=>x.totC>0).sort((a,b)=>b.totC-a.totC);

  const rows=rowsData.map(({c,totC})=>{
    const celdas=TRAMOS.map(t=>{const v=pv2[c][t]||0;return `<td class="${hc(t,v)}" onclick="drillCatR('${c}','${t}')" style="cursor:pointer">${v>0?fmtM(v):'—'}</td>`;}).join('');
    return `<tr class="clickable" id="cxc-row-${c.replace(/[^a-zA-Z0-9]/g,'_')}" onclick="drillCatCxC('${c}')" style="cursor:pointer"><td>${c}</td>${celdas}<td style="font-weight:600">${fmtM(totC)}</td></tr>`;
  }).join('');

  const tagCli=[...exCli].map(c=>`<span class="tag tag-red" onclick="rmExc('cli','${c.replace(/'/g,"\\'")}')">✕ ${c}</span>`).join('');
  const tagCat=[...exCat].map(c=>`<span class="tag tag-amb" onclick="rmExc('cat','${c.replace(/'/g,"\\'")}')">✕ ${c}</span>`).join('');

  const anioBtns=todosAnios.map(a=>`<button
    style="padding:4px 12px;font-size:11px;font-weight:500;cursor:pointer;border-radius:20px;
      ${selAnios.has(a)
        ?'background:rgba(29,158,117,.15);color:var(--grn);border:1.5px solid var(--grn)'
        :'background:transparent;color:var(--muted);border:1px solid rgba(255,255,255,.1)'}"
    onclick="toggleAnio('${a}')">${a}</button>`).join('');

  document.getElementById('mc').innerHTML=`
    <div class="kpis" style="margin-top:18px">
      <div class="kpi"><div class="kpi-l">Total CxC</div><div class="kpi-v">${fmtM(tot)}</div><div class="kpi-s">${nCli} clientes</div></div>
      <div class="kpi"><div class="kpi-l">Vencido</div><div class="kpi-v red">${fmtM(venc)}</div><div class="kpi-s">${(venc/tot*100).toFixed(1)}% del total</div></div>
      <div class="kpi"><div class="kpi-l">Por vencer</div><div class="kpi-v grn">${fmtM(pv)}</div><div class="kpi-s">${(pv/tot*100).toFixed(1)}% del total</div></div>
      <div class="kpi"><div class="kpi-l">120+ días</div><div class="kpi-v amb">${fmtM(crit)}</div><div class="kpi-s">deuda crítica</div></div>
    </div>
    <div class="filter-row" style="margin-bottom:8px">
      <span style="font-size:11px;color:var(--muted);margin-right:4px">Año emisión:</span>
      ${anioBtns}
      ${selAnios.size?'<span class="tag tag-amb" onclick="selAnios.clear();rResumen()" style="cursor:pointer">&#10005; Limpiar</span>':''}
    </div>
    <div class="filter-row">
      <button class="filter-btn ${fest==='todos'?'on':''}"     onclick="setFR('todos',this)">Todos</button>
      <button class="filter-btn ${fest==='vencido'?'on':''}"   onclick="setFR('vencido',this)">Vencidos</button>
      <button class="filter-btn ${fest==='porvencer'?'on':''}" onclick="setFR('porvencer',this)">Por vencer</button>
      <label class="heat-toggle" style="margin-left:auto"><input type="checkbox" ${heat?'checked':''} onchange="heat=this.checked;rResumen()"> Mapa de calor</label>
    </div>
    <div class="filter-row">
      ${tagCli}${tagCat}
      <input class="exc-input" placeholder="Excluir cliente..." onkeydown="if(event.key==='Enter')addExcCli(this.value,this)" autocomplete="off"/>
      <input class="exc-input" placeholder="Excluir categoría..." onkeydown="if(event.key==='Enter')addExcCat2(this.value,this)" autocomplete="off"/>
    </div>
    <div class="card">
      <div class="card-head">
        <div><div class="card-title">Resumen por categoría de cliente</div><div class="card-sub">Clic en fila → ver clientes · clic en celda → ver tramo · Excluir: usa inputs abajo</div></div>
      </div>
      <div style="overflow-x:auto"><table><thead><tr><th>Categoría</th>${thT}<th>Total</th></tr></thead><tbody>${rows}</tbody></table></div>
    </div>
    <div id="drill-cxc" style="display:none"></div>
    <div id="drill-area"></div>
    <div class="card">
      <div class="card-head"><div class="card-title">Top 20 clientes</div></div>
      <div style="overflow-x:auto">${top20(data)}</div>
    </div>`;
}

function top20(data){
  const m={};
  data.forEach(r=>{const k=r['NOMBRE /RAZON SOCIAL'];if(!m[k])m[k]={rut:r['RUT COMPLETO'],cat:r.CLI_HOLDING,tot:0,v:0,md:0};const s=num(r.SALDO);m[k].tot+=s;if(r.ESTADO==='VENCIDO'){m[k].v+=s;m[k].md=Math.max(m[k].md,num(r['DIAS VENCIDOS']));} });
  const sorted=Object.entries(m).sort((a,b)=>b[1].tot-a[1].tot).slice(0,20);
  const rows=sorted.map(([n,d])=>`<tr class="clickable" onclick="goTo('${n.replace(/'/g,"\\'")}')">
    <td>${n}</td>
    <td style="color:var(--muted);font-size:11px">${d.rut}</td>
    <td>${d.cat}</td>
    <td>${fmtM(d.tot)}</td>
    <td class="red">${fmtM(d.v)}</td>
    <td style="color:${d.md>90?'var(--red)':d.md>30?'var(--amb)':'var(--grn)'}">${d.md>0?d.md+'d':'—'}</td>
  </tr>`).join('');
  return `<table><thead><tr><th>Cliente</th><th>RUT</th><th>Categoría</th><th>Total</th><th>Vencido</th><th>Máx días</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function toggleAnio(a){
  if(selAnios.has(a)) selAnios.delete(a); else selAnios.add(a);
  rResumen();
}

// ── DRILL CAT (fila completa) ────────────────────────────────
let _dAC='';
function drillCatCxC(cat){
  if(_dAC===cat){_dAC='';document.getElementById('drill-cxc').style.display='none';document.querySelectorAll('#mc tr.clickable').forEach(r=>r.classList.remove('sel'));return;}
  _dAC=cat;
  document.querySelectorAll('#mc tr.clickable').forEach(r=>r.classList.remove('sel'));
  const rowEl=document.getElementById('cxc-row-'+cat.replace(/[^a-zA-Z0-9]/g,'_'));
  if(rowEl) rowEl.classList.add('sel');
  const clientes={};
  fd().filter(r=>r.CLI_HOLDING===cat).forEach(r=>{
    const k=r['NOMBRE /RAZON SOCIAL'];
    if(!clientes[k]) clientes[k]={rut:r['RUT COMPLETO'],venc:0,pv:0};
    if(r.ESTADO==='VENCIDO') clientes[k].venc+=num(r.SALDO);
    else clientes[k].pv+=num(r.SALDO);
  });
  const lista=Object.entries(clientes).map(([n,d])=>({n,rut:d.rut,venc:d.venc,pv:d.pv,tot:d.venc+d.pv})).filter(c=>c.tot>0).sort((a,b)=>b.tot-a.tot);
  const totV=lista.reduce((s,c)=>s+c.venc,0);
  const totP=lista.reduce((s,c)=>s+c.pv,0);
  const rows=lista.map(c=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bdr);cursor:pointer" onclick="goTo('${c.n.replace(/'/g,"\\'")}')">
      <div><div style="font-size:13px;font-weight:500">${c.n}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">${c.rut}</div></div>
      <div style="display:flex;gap:14px;align-items:center">
        <div style="text-align:right"><div style="font-size:10px;color:var(--muted);text-transform:uppercase">Vencido</div><div style="font-family:var(--mono);font-size:12px;color:${c.venc>0?'var(--red)':'var(--muted)'}">${c.venc>0?fmtM(c.venc):'—'}</div></div>
        <div style="text-align:right"><div style="font-size:10px;color:var(--muted);text-transform:uppercase">Por vencer</div><div style="font-family:var(--mono);font-size:12px;color:${c.pv>0?'var(--grn)':'var(--muted)'}">${c.pv>0?fmtM(c.pv):'—'}</div></div>
        <div style="text-align:right;min-width:70px"><div style="font-size:10px;color:var(--muted);text-transform:uppercase">Total</div><div style="font-family:var(--mono);font-size:12px;font-weight:600">${fmtM(c.tot)}</div></div>
        <span style="font-size:13px;color:var(--grn)">→</span>
      </div>
    </div>`).join('');
  document.getElementById('drill-cxc').innerHTML=`
    <div class="drill" style="border-left-color:var(--grn)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div><div style="font-size:13px;font-weight:600">${cat}</div><div style="font-size:11px;color:var(--muted)">${lista.length} clientes</div></div>
        <button onclick="_dAC='';document.getElementById('drill-cxc').style.display='none';document.querySelectorAll('#mc tr.clickable').forEach(r=>r.classList.remove('sel'))"
          style="padding:4px 12px;border:1px solid var(--bdr2);border-radius:6px;background:none;color:var(--muted);cursor:pointer;font-size:12px">✕ Cerrar</button>
      </div>
      ${rows}
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid var(--bdr)">
        <div class="stat"><div class="stat-l">Vencido</div><div class="stat-v red">${fmtM(totV)}</div></div>
        <div class="stat"><div class="stat-l">Por vencer</div><div class="stat-v grn">${fmtM(totP)}</div></div>
        <div class="stat"><div class="stat-l">Total</div><div class="stat-v">${fmtM(totV+totP)}</div></div>
      </div>
    </div>`;
  document.getElementById('drill-cxc').style.display='block';
  setTimeout(()=>document.getElementById('drill-cxc').scrollIntoView({behavior:'smooth',block:'nearest'}),80);
}

// ── DRILL TRAMO (celda específica) ───────────────────────────
function drillCatR(cat,tramo){
  const data=fd().filter(r=>r.CLI_HOLDING===cat&&r['Clasifica vcto']===tramo);
  if(!data.length) return;
  const m={};
  data.forEach(r=>{const k=r['NOMBRE /RAZON SOCIAL'];if(!m[k])m[k]={rut:r['RUT COMPLETO'],tot:0};m[k].tot+=num(r.SALDO);});
  const sorted=Object.entries(m).sort((a,b)=>b[1].tot-a[1].tot);
  const rows=sorted.map(([n,d])=>`<tr class="clickable" onclick="goTo('${n.replace(/'/g,"\\'")}')"><td>${n}</td><td style="color:var(--muted);font-size:11px">${d.rut}</td><td>${fmtM(d.tot)}</td><td><span style="font-size:11px;color:var(--grn)">-> Ver ficha</span></td></tr>`).join('');
  document.getElementById('drill-area').innerHTML=`
    <div class="drill">
      <div style="font-size:12px;font-weight:500;margin-bottom:10px;display:flex;justify-content:space-between">
        <span>${cat} - ${TL[tramo]} - ${sorted.length} clientes</span>
        <span style="font-size:11px;color:var(--muted);cursor:pointer" onclick="document.getElementById('drill-area').innerHTML=''">X Cerrar</span>
      </div>
      <table><thead><tr><th>Cliente</th><th>RUT</th><th>Saldo</th><th></th></tr></thead><tbody>${rows}</tbody></table>
    </div>`;
}
function setFR(f){fest=f;rResumen();}
function addExcCat(c){exCat.add(c);rResumen();}
function addExcCli(v,el){const m=D.find(r=>r['NOMBRE /RAZON SOCIAL'].toLowerCase().includes(v.toLowerCase()));if(m)exCli.add(m['NOMBRE /RAZON SOCIAL']);el.value='';rResumen();}
function addExcCat2(v,el){const m=D.find(r=>r.CLI_HOLDING.toLowerCase().includes(v.toLowerCase()));if(m)exCat.add(m.CLI_HOLDING);el.value='';rResumen();}
function rmExc(tipo,val){if(tipo==='cli')exCli.delete(val);else exCat.delete(val);rResumen();}
function goTo(n){tab='buscar';document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',i===0));rBuscar();setTimeout(()=>{document.getElementById('inp').value=n;rFicha(n);},50);}

// ── HISTÓRICO ─────────────────────────────────────────────────
function rHist(){
  document.getElementById('mc').innerHTML=`
    <div style="position:relative;margin-top:18px;margin-bottom:14px">
      <input id="inp-hist" style="width:100%;padding:10px 16px;background:var(--bg2);border:1px solid var(--bdr2);border-radius:8px;color:var(--text);font-family:var(--font);font-size:14px;outline:none" placeholder="Buscar cliente..." autocomplete="off" oninput="onHI(this.value)"/>
      <div id="hist-ac" style="position:absolute;top:100%;left:0;right:0;background:var(--bg2);border:1px solid var(--bdr2);border-radius:0 0 8px 8px;z-index:50;max-height:200px;overflow-y:auto;display:none"></div>
    </div>
    <div id="hist-area"><div class="state-box"><span>Busca un cliente para ver su histórico de documentos</span></div></div>`;
}

function onHI(v){
  const ac=document.getElementById('hist-ac');
  if(v.length<2){ac.style.display='none';return;}
  const q=v.toLowerCase();
  const m=[...new Map(D.filter(r=>r['NOMBRE /RAZON SOCIAL'].toLowerCase().includes(q)||r['RUT COMPLETO'].includes(q)).map(r=>[r['NOMBRE /RAZON SOCIAL'],r])).values()].slice(0,8);
  if(!m.length){ac.style.display='none';return;}
  ac.innerHTML=m.map(r=>`<div class="ac-item" onclick="rHistCli('${r['NOMBRE /RAZON SOCIAL'].replace(/'/g,"\\'")}')"><b>${r['NOMBRE /RAZON SOCIAL']}</b> <span style="color:var(--muted);font-size:11px">${r['RUT COMPLETO']}</span></div>`).join('');
  ac.style.display='block';
}

function rHistCli(nombre){
  document.getElementById('inp-hist').value=nombre;
  document.getElementById('hist-ac').style.display='none';

  const docs = D.filter(r=>r['NOMBRE /RAZON SOCIAL']===nombre);
  if(!docs.length){document.getElementById('hist-area').innerHTML='<div class="state-box"><span>Sin documentos.</span></div>';return;}

  const tot  = docs.reduce((s,r)=>s+num(r.SALDO),0);
  const venc = docs.filter(r=>r.ESTADO==='VENCIDO').reduce((s,r)=>s+num(r.SALDO),0);
  const pv   = docs.filter(r=>r.ESTADO==='POR VENCER').reduce((s,r)=>s+num(r.SALDO),0);

  // Agrupar por tramo de aging para gráfico
  const tramoDat = {};
  TRAMOS.forEach(t=>tramoDat[t]=0);
  docs.forEach(r=>tramoDat[r['Clasifica vcto']]=(tramoDat[r['Clasifica vcto']]||0)+num(r.SALDO));

  // Generar últimos 12 meses desde hoy (con ceros donde no haya datos)
  const hoy = new Date();
  const ultimos12 = [];
  for(let i=11;i>=0;i--){
    const d = new Date(hoy.getFullYear(), hoy.getMonth()-i, 1);
    const yyyymm = String(d.getFullYear()) + String(d.getMonth()+1).padStart(2,'0');
    ultimos12.push(yyyymm);
  }
  const byMes = {};
  ultimos12.forEach(m=>byMes[m]={venc:0,pv:0});
  docs.forEach(r=>{
    const k = (r['MES-AÑO']||'').replace('.0','').trim();
    if(!k||k==='nan'||!byMes[k]) return;
    if(r.ESTADO==='VENCIDO') byMes[k].venc+=num(r.SALDO);
    else byMes[k].pv+=num(r.SALDO);
  });
  const meses = ultimos12;
  const mesLabels = meses.map(m=>{
    const mm={'01':'Ene','02':'Feb','03':'Mar','04':'Abr','05':'May','06':'Jun',
              '07':'Jul','08':'Ago','09':'Sep','10':'Oct','11':'Nov','12':'Dic'};
    // formato YYYYMM
    return (mm[m.slice(4,6)]||m.slice(4,6))+"'"+m.slice(2,4);
  });

  // Tabla documentos
  const docsSort = [...docs].sort((a,b)=>num(b['DIAS VENCIDOS'])-num(a['DIAS VENCIDOS']));
  const rows = docsSort.map(r=>{
    const d=num(r['DIAS VENCIDOS']),ev=r.ESTADO==='VENCIDO';
    return `<tr><td>${r['NOMBRE COD.DOC.']} #${r['#DOC.']}</td><td>${r['EMISIÓN']}</td><td>${r['VENCIM.']}</td><td>${r.SEDE}</td><td class="${ev?'red':''}">${fmtCL(num(r.SALDO))}</td><td><span class="${ev?'badge-venc':'badge-ok'}">${ev?d+'d':'Por vencer'}</span></td></tr>`;
  }).join('');

  // Tramos HTML
  const tramosH = TRAMOS.map(t=>tramoDat[t]>0
    ?`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--bdr);font-size:12px">
        <span style="color:${t==='POR VENCER'?'var(--grn)':'var(--red)'}">${TL[t]}</span>
        <span style="font-family:var(--mono)">${fmtCL(tramoDat[t])}</span>
      </div>`:''
  ).join('');

  document.getElementById('hist-area').innerHTML=`
    <div class="ficha" style="margin-top:0">
      <div class="ficha-head">
        <div><div class="ficha-nombre">${nombre}</div><div class="ficha-rut">${docs[0]['RUT COMPLETO']} · ${docs[0].CLI_HOLDING} · ${docs[0].SEDE}</div></div>
        <span class="${venc>0?'badge-venc':'badge-ok'}">${venc>0?'Con deuda vencida':'Al día'}</span>
      </div>
      <div class="ficha-stats">
        <div class="stat"><div class="stat-l">Total deuda</div><div class="stat-v">${fmtM(tot)}</div></div>
        <div class="stat"><div class="stat-l">Vencido</div><div class="stat-v red">${fmtM(venc)}</div></div>
        <div class="stat"><div class="stat-l">Por vencer</div><div class="stat-v grn">${fmtM(pv)}</div></div>
      </div>
      <div style="margin-bottom:14px">${tramosH}</div>
    </div>
    <div class="card">
      <div class="ch">
        <div><div class="ct">Evolución de deuda por mes de emisión</div>
        <div class="cs">Vencido vs Por vencer · todos los meses</div></div>
        <div class="leg">
          <span class="li"><span class="ll" style="background:var(--red)"></span>Vencido</span>
          <span class="li"><span class="ll" style="background:var(--grn)"></span>Por vencer</span>
        </div>
      </div>
      <div class="cw" style="height:220px"><canvas id="histChartCxC"></canvas></div>
    </div>
    <div class="card" style="margin-top:0">
      <div class="card-head"><div class="card-title">Detalle de documentos · ${docs.length} registros</div></div>
      <div style="overflow-x:auto"><table><thead><tr><th>Documento</th><th>Emisión</th><th>Vencimiento</th><th>Sede</th><th>Saldo</th><th>Estado</th></tr></thead><tbody>${rows}</tbody></table></div>
    </div>`;

  // Renderizar chart
  if(histChart){histChart.destroy();histChart=null;}
  setTimeout(()=>{
      const ctx = document.getElementById('histChartCxC');
      if(!ctx) return;
      histChart = new Chart(ctx,{
        type:'bar',
        data:{
          labels: mesLabels,
          datasets:[
            {label:'Vencido', data:meses.map(m=>Math.round(byMes[m].venc/1e6*10)/10),
             backgroundColor:'rgba(201,74,74,.7)', borderRadius:4, barPercentage:.6, categoryPercentage:.7},
            {label:'Por vencer', data:meses.map(m=>Math.round(byMes[m].pv/1e6*10)/10),
             backgroundColor:'rgba(29,158,117,.7)', borderRadius:4, barPercentage:.6, categoryPercentage:.7}
          ]
        },
        options:{
          responsive:true, maintainAspectRatio:false,
          interaction:{mode:'index',intersect:false},
          plugins:{
            legend:{display:false},
            tooltip:{backgroundColor:'#1a1d27',borderColor:'rgba(255,255,255,.1)',borderWidth:1,
              titleColor:'#e8eaf0',bodyColor:'#7a7f94',padding:10,
              callbacks:{label:ctx=>' '+ctx.dataset.label+': M$'+ctx.parsed.y.toLocaleString('es-CL')}}
          },
          scales:{
            x:{grid:{display:false},ticks:{color:'#7a7f94',font:{size:11}},border:{color:'rgba(255,255,255,.07)'},stacked:true},
            y:{grid:{color:'rgba(255,255,255,.05)'},border:{display:false},stacked:true,
               ticks:{color:'#7a7f94',font:{size:11},callback:v=>'M$'+v.toLocaleString('es-CL')}}
          }
        }
      });
  },80);
}

// ── INIT ──────────────────────────────────────────────────────
document.getElementById('mc').innerHTML =
  '<div class="state-box"><div style="width:26px;height:26px;border:2px solid rgba(255,255,255,.13);border-top-color:#1d9e75;border-radius:50%;animation:spin .8s linear infinite"></div><span>Cargando datos...</span></div>';

(async () => {
  try {
    D = await loadData();
    const meta = await loadMeta();
    const totAll = D.reduce((s,r)=>s+num(r.SALDO),0);
    document.getElementById('dtag').textContent =
      '$'+Math.round(totAll/1e6).toLocaleString('es-CL')+'M · '+D.length+' docs'+(meta?' · Sync: '+meta:'');
    rBuscar();
  } catch(e) {
    document.getElementById('mc').innerHTML =
      `<div class="state-box"><span style="color:#c94a4a">Error al cargar datos</span><span style="font-size:12px">${e.message}</span><span style="font-size:11px;color:#7a7f94">Verificar que el Sheet es público y la API Key es válida</span></div>`;
    document.getElementById('dtag').textContent = 'Error';
  }
})();
</script>
</body>
</html>
